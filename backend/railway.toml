[build]
builder = "nixpacks"
buildCommand = "npm install && npx prisma generate && npm run build"

[deploy]
startCommand = "npx prisma migrate deploy && npm start"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[[deploy.healthcheckPath]]
path = "/health"

[deploy.env]
NODE_ENV = "production"
